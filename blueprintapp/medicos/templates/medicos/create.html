{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="p-4 text-white text-center" style="background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);">
                <i class="bi bi-person-plus-fill display-5"></i>
                <h4 class="fw-bold mt-2 mb-1">Alta de Especialistas</h4>
                <p class="mb-0 text-white-50 small">Rellene los campos para el registro institucional</p>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">Nombre Completo</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-person-fill"></i></span>
                            <input type="text" name="nombre" class="form-control bg-light border-start-0" placeholder="Ej. Dr. Carlos Mendoza" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary small fw-bold">Especialidad Clínica</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light text-muted border-end-0"><i class="bi bi-patch-check-fill"></i></span>
                            <input type="text" name="especialidad" class="form-control bg-light border-start-0" placeholder="Ej. Cardiología / Pediatría" required>
                        </div>
                    </div>
                    <div class="row g-2">
                        <div class="col-6">
                            <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">Guardar Registro</button>
                        </div>
                        <div class="col-6">
                            <a href="{{ url_for('medicos.index') }}" class="btn btn-light w-100 py-2 rounded-pill fw-bold text-secondary border">Cancelar</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
