<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediControl Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .hover-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .hover-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 1rem 3rem rgba(0,0,0,.155)!important;
        }
        .nav-link {
            transition: all 0.2s ease;
            border-radius: 8px;
            margin: 0 3px;
        }
        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff !important;
        }
        .nav-link.active-custom {
            background-color: #0d6efd;
            color: white !important;
        }
        .glass-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark glass-header shadow mb-4 py-3 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4 text-white d-flex align-items-center gap-2" href="/">
                <i class="bi bi-heart-pulse-fill text-danger animate-pulse"></i> MediControl<span class="text-primary">Pro</span>
            </a>
            <button class="navbar-collapse navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 text-white-50 d-flex align-items-center gap-2" href="{{ url_for('medicos.index') }}">
                            <i class="bi bi-person-md fs-5 text-primary"></i> Médicos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 text-white-50 d-flex align-items-center gap-2" href="{{ url_for('pacientes.index') }}">
                            <i class="bi bi-people-fill fs-5 text-success"></i> Pacientes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 py-2 text-white-50 d-flex align-items-center gap-2" href="{{ url_for('citas.index') }}">
                            <i class="bi bi-calendar-check-fill fs-5 text-warning"></i> Gestión de Citas
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-2 flex-grow-1">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer mt-auto py-3 bg-white border-top text-center text-muted shadow-sm">
        <div class="container">
            <span class="small">💻 Sistema Monolítico Modular — Examen Segundo Parcial</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
